<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background: linear-gradient(135deg,#eef2ff,#f8fafc);
      font-family: 'Segoe UI', sans-serif;
    }

    /* SIDEBAR */
    .sidebar{
      height:100vh;
      width:240px;
      position:fixed;
      background: #0f172a;
      padding:20px;
      color:white;
    }

    .sidebar h3{
      font-weight:800;
      margin-bottom:30px;
      color:#60a5fa;
    }

    .sidebar a{
      display:block;
      padding:12px;
      margin-bottom:10px;
      color:#cbd5e1;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:#1e293b;
      transform:translateX(5px);
      color:white;
    }

    .logout-btn{
      width:100%;
      margin-top:20px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#ef4444;
      color:white;
      font-weight:700;
    }

    .logout-btn:hover{
      background:#dc2626;
    }

    /* MAIN */
    .main{
      margin-left:260px;
      padding:30px;
    }

    /* TOPBAR */
    .topbar{
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding:18px 25px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    /* CARD */
    .card-box{
      background:white;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.06);
      text-align:center;
      transition:0.3s;
    }

    .card-box:hover{
      transform:translateY(-6px);
    }

    .card-box h6{
      color:#64748b;
      font-weight:600;
    }

    .card-box h1, .card-box h5{
      font-weight:800;
    }

    /* TABLE */
    .table-box{
      background:white;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.06);
    }

    .section-title{
      font-weight:800;
      margin-bottom:15px;
      color:#0f172a;
    }

    /* BADGE */
    .badge{
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
    }

    /* smooth table */
    table tr{
      transition:0.2s;
    }

    table tr:hover{
      background:#f1f5f9;
    }

  </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>💼 Job Portal</h3>

  <a href="#"> Dashboard</a>
  <a href="jobs.html"> Jobs</a>
  <a href="#reportSection"> Report</a>
  <a href="#applicationSection"> Applications</a>

  <button class="logout-btn" onclick="logout()">Logout</button>

</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar d-flex justify-content-between align-items-center">

    <h4 style="font-weight:800;">User Dashboard</h4>

    <h5 style="color:#334155;">
      Welcome, <b id="username"></b>
    </h5>

  </div>

  <!-- USER INFO -->
  <div class="row">

    <div class="col-md-6">
      <div class="card-box">
        <h6>Email</h6>
        <h5 id="userEmail"></h5>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card-box">
        <h6>Status</h6>
        <h5 style="color:#16a34a;">Active</h5>
      </div>
    </div>

  </div>

  <!-- REPORT -->
  <div class="mt-5" id="reportSection">

    <h3 class="section-title"> Summary</h3>

    <div class="row">

      <div class="col-md-4">
        <div class="card-box">
          <h6>Total Applied</h6>
          <h1 id="reportTotal">0</h1>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card-box">
          <h6 style="color:#16a34a;">Accepted</h6>
          <h1 id="reportAccepted" style="color:#16a34a;">0</h1>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card-box">
          <h6 style="color:#ef4444;">Rejected</h6>
          <h1 id="reportRejected" style="color:#ef4444;">0</h1>
        </div>
      </div>

    </div>

  </div>

  <!-- APPLICATIONS -->
  <div class="table-box mt-5" id="applicationSection">

    <h3 class="section-title">📄 Applications</h3>

    <table class="table">

      <thead>
      <tr>
        <th>Job Title</th>
        <th>Company</th>
        <th>Status</th>
      </tr>
      </thead>

      <tbody id="applicationTable"></tbody>

    </table>

  </div>

</div>

<script>

  let user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    window.location.href = "login.html";
  }

  document.getElementById("username").innerText = user.name;
  document.getElementById("userEmail").innerText = user.email;

  // FETCH APPLICATIONS
  fetch("http://localhost:8080/application/user/" + user.email)
          .then(res => res.json())
          .then(data => {

            let rows = "";
            let accepted = 0;
            let rejected = 0;

            data.forEach(app => {

              let badge = "secondary";

              if(app.status === "ACCEPTED"){
                badge = "success";
                accepted++;
              }
              else if(app.status === "REJECTED"){
                badge = "danger";
                rejected++;
              }
              else{
                badge = "warning";
              }

              rows += `
      <tr>
        <td>${app.jobTitle}</td>
        <td>${app.companyName}</td>
        <td><span class="badge bg-${badge}">${app.status}</span></td>
      </tr>
    `;
            });

            document.getElementById("applicationTable").innerHTML = rows;
            document.getElementById("reportTotal").innerText = data.length;
            document.getElementById("reportAccepted").innerText = accepted;
            document.getElementById("reportRejected").innerText = rejected;

          });

  function logout(){
    localStorage.clear();
    window.location.href = "login.html";
  }

</script>

</body>
</html>
