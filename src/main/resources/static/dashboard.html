<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #eef1f5;
      font-family: 'Segoe UI', sans-serif;
    }

    .sidebar {
      height: 100vh;
      background: #1e293b;
      color: white;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      padding: 12px;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .sidebar a:hover {
      background: #334155;
      color: white;
    }

    .topbar {
      background: white;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .card-box {
      border-radius: 15px;
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .table-box {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .logout-btn {
      margin-top: 30px;
      background: #ef4444;
      border: none;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h4>💼 Job Portal</h4>

      <a href="#"> Dashboard</a>
      <a href="#"> Profile</a>
      <a href="#"> Jobs</a>
      <a href="#"> Applications</a>

      <button class="btn logout-btn w-100" onclick="logout()">Logout</button>
    </div>

    <!-- Main -->
    <div class="col-md-10 p-4">

      <!-- Topbar -->
      <div class="topbar d-flex justify-content-between align-items-center">
        <h5>Dashboard</h5>
        <span>Welcome, <b id="username"></b></span>
      </div>

      <!-- USER CARDS -->
      <div class="row mt-4">

        <div class="col-md-4">
          <div class="card-box">
            <h6>Email</h6>
            <h5 id="userEmail"></h5>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box">
            <h6>Skills</h6>
            <h5 id="userSkills"></h5>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box">
            <h6>Status</h6>
            <h5 style="color:green;">Active</h5>
          </div>
        </div>

      </div>


      <div class="row mt-4">

        <div class="col-md-4">
          <div class="card-box">
            <h6>Total Jobs</h6>
            <h2 id="totalJobs">0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box">
            <h6>Accepted</h6>
            <h2 id="accepted">0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box">
            <h6>Rejected</h6>
            <h2 id="rejected">0</h2>
          </div>
        </div>

      </div>

      <!-- PROFILE TABLE -->
      <div class="table-box mt-4">
        <h5>Your Profile Data</h5>

        <table class="table mt-3">
          <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Skills</th>
          </tr>
          </thead>

          <tbody id="userTable"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>

  //  user
  let user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    window.location.href = "/login.html";
  }

  // show user info
  document.getElementById("username").innerText = user.name;
  document.getElementById("userEmail").innerText = user.email;
  document.getElementById("userSkills").innerText = user.skills || "Not added";

  // 🔥 fetch user data database theke
  fetch("http://localhost:8080/users/" + user.id)
          .then(res => res.json())
          .then(data => {

            document.getElementById("userTable").innerHTML = `
      <tr>
        <td>${data.name}</td>
        <td>${data.email}</td>
        <td>${data.skills || "Not set"}</td>
      </tr>
    `;

          });

  //  API
  fetch("http://localhost:8080/stats")
          .then(res => res.json())
          .then(data => {

            document.getElementById("totalJobs").innerText = data.totalJobs;
            document.getElementById("accepted").innerText = data.accepted;
            document.getElementById("rejected").innerText = data.rejected;

          })
          .catch(() => {
            console.log("Stats API error");
          });

  function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
  }

</script>

</body>
</html>
