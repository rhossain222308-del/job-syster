<!DOCTYPE html>
<html>
<head>
    <title>Company Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f1f5f9;
            font-family:Arial;
        }

        .sidebar{
            height:100vh;
            background:#0f172a;
            color:white;
            padding:20px;
        }

        .sidebar a{
            display:block;
            padding:12px;
            color:#cbd5e1;
            text-decoration:none;
            margin-bottom:10px;
            border-radius:10px;
        }

        .sidebar a:hover{
            background:#1e293b;
        }

        .logout-btn{
            width:100%;
            margin-top:30px;
            background:#ef4444;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
        }

        .topbar{
            background:white;
            padding:18px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        .card-box{
            background:white;
            padding:20px;
            border-radius:15px;
            text-align:center;
        }

        .job-form{
            background:white;
            padding:20px;
            border-radius:15px;
        }

        .btn-post{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
        }

        .btn-post:hover{
            background:#1d4ed8;
        }

    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">

            <h3>🏢 Company</h3>

            <a href="#">Dashboard</a>
            <a href="#">Post Job</a>
            <a href="#">Applicants</a>

            <button class="logout-btn" onclick="logout()">Logout</button>

        </div>

        <!-- MAIN -->
        <div class="col-md-10 p-4">

            <!-- TOPBAR -->
            <div class="topbar d-flex justify-content-between">

                <h4>Company Dashboard</h4>

                <b id="companyName"></b>

            </div>

            <!-- CARDS -->
            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card-box">
                        <h6>Total Jobs</h6>
                        <h2 id="totalJobs">0</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card-box">
                        <h6>Total Applicants</h6>
                        <h2 id="totalApplicants">0</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card-box">
                        <h6>Status</h6>
                        <h2 style="color:green;">Active</h2>
                    </div>
                </div>

            </div>

            <!-- JOB FORM -->
            <div class="job-form mt-4">

                <h4>Post New Job</h4>

                <input id="title" class="form-control mt-2" placeholder="Job Title">

                <textarea id="description" class="form-control mt-2" placeholder="Job Description"></textarea>

                <button class="btn-post mt-3" onclick="postJob()">
                    Post Job
                </button>

                <p id="msg" class="mt-2"></p>

            </div>

            <!-- JOB LIST -->
            <div class="mt-4">

                <h4>Posted Jobs</h4>

                <table class="table mt-3">

                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody id="jobTable"></tbody>

                </table>

            </div>

        </div>
    </div>
</div>

<script>

    let company = JSON.parse(localStorage.getItem("company"));

    if(!company){
        window.location.href = "company-login.html";
    }

    // FIX COMPANY NAME ACCESS
    document.getElementById("companyName").innerText =
        company.name || "Company";

    loadJobs();

    // POST JOB
    function postJob(){

        fetch("http://localhost:8080/company/job", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({

                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                companyName: company.name,
                status: "ACTIVE"

            })
        })
            .then(res => res.json())
            .then(() => {
                document.getElementById("msg").innerText = "Job Posted Successfully";
                document.getElementById("msg").style.color = "green";

                loadJobs();
            })
            .catch(() => {
                document.getElementById("msg").innerText = "Error posting job";
                document.getElementById("msg").style.color = "red";
            });

    }

    // LOAD JOBS (FIXED ENDPOINT)
    function loadJobs(){

        fetch("http://localhost:8080/jobs/company/" + company.name)
            .then(res => res.json())
            .then(data => {

                document.getElementById("totalJobs").innerText = data.length;

                let rows = "";

                data.forEach(job => {

                    rows += `
                <tr>
                    <td>${job.title}</td>
                    <td>${job.description}</td>
                    <td>
                        <span class="badge bg-success">
                            ${job.status}
                        </span>
                    </td>
                </tr>
            `;
                });

                document.getElementById("jobTable").innerHTML = rows;

            });

    }

    // LOGOUT
    function logout(){
        localStorage.clear();
        window.location.href = "company-login.html";
    }

</script>

</body>
</html>
