<!DOCTYPE html>
<html>
<head>
    <title>Company Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f1f5f9;
            font-family:Arial;
        }

        /* SIDEBAR */
        .sidebar{
            height:100vh;
            background:#0f172a;
            color:white;
            padding:20px;
        }

        .sidebar h3{
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            padding:12px;
            text-decoration:none;
            color:#cbd5e1;
            border-radius:10px;
            margin-bottom:10px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1e293b;
            color:white;
        }

        .logout-btn{
            margin-top:30px;
            width:100%;
            border:none;
            padding:12px;
            border-radius:10px;
            background:#ef4444;
            color:white;
            font-weight:bold;
        }

        .logout-btn:hover{
            background:#dc2626;
        }

        /* TOPBAR */
        .topbar{
            background:white;
            padding:18px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        /* CARD */
        .card-box{
            background:white;
            border-radius:15px;
            padding:20px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        .card-box h2{
            font-weight:bold;
        }

        /* TABLE */
        .table-box{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        /* FORM */
        .job-form{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        .btn-post{
            background:#2563eb;
            color:white;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-weight:bold;
        }

        .btn-post:hover{
            background:#1d4ed8;
        }

    </style>
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">

            <h3>🏢 Company</h3>

            <a href="#"> Dashboard</a>
            <a href="#"> Post Job</a>
            <a href="#"> Manage Jobs</a>
            <a href="#"> Applicants</a>
            <a href="#"> Settings</a>

            <button class="logout-btn" onclick="logout()">
                Logout
            </button>

        </div>

        <!-- MAIN -->
        <div class="col-md-10 p-4">

            <!-- TOPBAR -->
            <div class="topbar d-flex justify-content-between">

                <h4>Company Dashboard</h4>

                <div>
                    Welcome,
                    <b id="companyName"></b>
                </div>

            </div>

            <!-- CARDS -->
            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card-box">
                        <h6>Total Jobs</h6>
                        <h2 id="totalJobs">0</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card-box">
                        <h6>Total Applicants</h6>
                        <h2>12</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card-box">
                        <h6>Status</h6>
                        <h2 style="color:green;">Active</h2>
                    </div>
                </div>

            </div>

            <!-- JOB POST FORM -->
            <div class="job-form mt-4">

                <h4 class="mb-3">Post New Job</h4>

                <input type="text"
                       id="title"
                       class="form-control mb-3"
                       placeholder="Job Title">

                <textarea id="description"
                          class="form-control mb-3"
                          placeholder="Job Description"></textarea>

                <input type="text"
                       id="location"
                       class="form-control mb-3"
                       placeholder="Job Location">

                <button class="btn-post" onclick="postJob()">
                    Post Job
                </button>

                <p id="msg" class="mt-3"></p>

            </div>

            <!-- JOB TABLE -->
            <div class="table-box mt-4">

                <h4>Posted Jobs</h4>

                <table class="table mt-3">

                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Location</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody id="jobTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

    // COMPANY DATA
    let company = JSON.parse(localStorage.getItem("company"));

    // SECURITY
    if(!company){
        window.location.href = "company-login.html";
    }

    // SHOW COMPANY NAME
    document.getElementById("companyName").innerText =
        company.company.name;

    // LOAD JOBS
    loadJobs();

    function postJob(){

        let title = document.getElementById("title").value;
        let description = document.getElementById("description").value;
        let location = document.getElementById("location").value;
        let msg = document.getElementById("msg");

        fetch("http://localhost:8080/company/job",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                title:title,
                description:description,
                location:location,
                companyName: company.company.name,
                status:"OPEN"

            })

        })

            .then(res => res.json())

            .then(data => {

                msg.innerText = "Job Posted Successfully";
                msg.style.color = "green";

                loadJobs();

            })

            .catch(() => {

                msg.innerText = "Error posting job";
                msg.style.color = "red";

            });

    }

    // LOAD JOB TABLE
    function loadJobs(){

        fetch("http://localhost:8080/jobs")

            .then(res => res.json())

            .then(data => {

                let table = "";

                document.getElementById("totalJobs").innerText =
                    data.length;

                data.forEach(job => {

                    table += `

            <tr>

              <td>${job.title}</td>

              <td>${job.location}</td>

              <td>
                <span class="badge bg-success">
                  ${job.status}
                </span>
              </td>

            </tr>

          `;

                });

                document.getElementById("jobTable").innerHTML = table;

            });

    }

    // LOGOUT
    function logout(){

        localStorage.clear();

        window.location.href = "company-login.html";

    }

</script>

</body>
</html>
