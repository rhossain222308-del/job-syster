<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #43cea2, #185a9d);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 400px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .btn-custom {
      background: #185a9d;
      color: white;
    }

    .btn-custom:hover {
      background: #144a7a;
    }

    #msg {
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="card p-4">
  <h3 class="text-center mb-3">Login</h3>

  <input class="form-control mb-2" type="email" id="email" placeholder="Email">
  <input class="form-control mb-3" type="password" id="password" placeholder="Password">

  <button class="btn btn-custom w-100" onclick="login()">Login</button>

  <p class="text-center mt-3" id="msg"></p>
</div>

<script>
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    // Validation
    if (!email || !password) {
      msg.innerText = "⚠️ Please fill all fields";
      msg.style.color = "red";
      return;
    }

    // Send login request
    fetch("http://localhost:8080/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    })
            .then(res => res.json())
            .then(data => {
              if (data.status === "success") {
                msg.innerText = "✅ Login successful";
                msg.style.color = "lightgreen";

                // Store authentication data
                localStorage.setItem("token", data.token);
                localStorage.setItem("user", JSON.stringify(data.user));
                localStorage.setItem("company", JSON.stringify(data));

                // Role‑based redirect
                setTimeout(() => {
                  if (data.user.role === "ADMIN") {
                    window.location.href = "admin-dashboard.html";
                  } else {
                    window.location.href = "dashboard.html";
                  }
                }, 1000);
              } else {
                msg.innerText = data.message;
                msg.style.color = "red";
              }
            })
            .catch(() => {
              msg.innerText = "❌ Server error!";
              msg.style.color = "red";
            });
  }
</script>

</body>
</html>
