<!DOCTYPE html>
<html>
<head>
  <title>Company Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #141e30, #243b55);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .card-box {
      width: 420px;
      padding: 30px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .form-control {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: #243b55;
      color: white;
      font-weight: bold;
    }

    .btn-login:hover {
      background: #141e30;
    }

    #msg {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card-box">

  <h3 class="title">Company Login</h3>

  <input type="email" id="email" class="form-control" placeholder="Enter company email">
  <input type="password" id="password" class="form-control" placeholder="Enter password">

  <button class="btn btn-login" onclick="login()">Login</button>

  <p id="msg"></p>

  <p class="text-center mt-3">
    Don't have account? <a href="company-register.html">Register</a>
  </p>

</div>

<script>
  function login() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    if (!email || !password) {
      msg.innerText = "Please fill all fields";
      msg.style.color = "red";
      return;
    }

    fetch("http://localhost:8080/company/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    })
            .then(res => res.json())
            .then(data => {

              if (data.status === "success") {

                localStorage.setItem("company", JSON.stringify(data.company));

                msg.innerText = "Login success";
                msg.style.color = "green";

                setTimeout(() => {
                  window.location.href = "company-dashboard.html";
                }, 1000);

              } else {
                msg.innerText = data.message;
                msg.style.color = "red";
              }

            });

  }
</script>

</body>
</html>
