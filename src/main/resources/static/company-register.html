<!DOCTYPE html>
<html>
<head>
  <title>Company Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #ff512f, #dd2476);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-box {
      width: 420px;
      padding: 30px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .form-control {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
    }

    .btn-register {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: #dd2476;
      color: white;
      font-weight: bold;
    }

    .btn-register:hover {
      background: #b81d62;
    }

    #msg {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card-box">

  <h3 class="title">Company Register</h3>

  <input type="text" id="name" class="form-control" placeholder="Company Name">
  <input type="email" id="email" class="form-control" placeholder="Company Email">
  <input type="password" id="password" class="form-control" placeholder="Password">

  <button class="btn btn-register" onclick="register()">Register</button>

  <p id="msg"></p>

  <p class="text-center mt-3">
    Already have account? <a href="company-login.html">Login</a>
  </p>

</div>

<script>
  function register() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    fetch("http://localhost:8080/company/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, email, password })
    })
            .then(res => res.json())
            .then(data => {

              msg.innerText = "Registered successfully";
              msg.style.color = "green";

              setTimeout(() => {
                window.location.href = "company-login.html";
              }, 1000);

            })
            .catch(() => {
              msg.innerText = "Error occurred";
              msg.style.color = "red";
            });

  }
</script>

</body>
</html>
