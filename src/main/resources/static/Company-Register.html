<!DOCTYPE html>
<html>
<head>
  <title>Company Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      width: 420px;
      padding: 30px;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px;
    }

    .btn-custom {
      background: #667eea;
      color: white;
      border-radius: 10px;
    }

    .btn-custom:hover {
      background: #5a67d8;
    }

    #msg {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card">
  <h3 class="title"> Company Register</h3>

  <input class="form-control mb-3" id="name" placeholder="Company Name">
  <input class="form-control mb-3" id="email" placeholder="Email">
  <input class="form-control mb-3" id="password" type="password" placeholder="Password">

  <button class="btn btn-custom w-100" onclick="register()">Register</button>

  <p id="msg"></p>

  <p class="text-center mt-2">
    Already have account? <a href="company-login.html">Login</a>
  </p>
</div>

<script>
  function register() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    if (!name || !email || !password) {
      msg.innerText = " Please fill all fields";
      msg.style.color = "red";
      return;
    }

    fetch("http://localhost:8080/company/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        name: name,
        email: email,
        password: password
      })
    })
            .then(res => res.text())
            .then(data => {
              msg.innerText = " Registration successful!";
              msg.style.color = "green";
            })
            .catch(() => {
              msg.innerText = " Server error!";
              msg.style.color = "red";
            });
  }
</script>

</body>
</html>
