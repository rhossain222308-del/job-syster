<!DOCTYPE html>
<html>
<head>
  <title>Available Jobs</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background: linear-gradient(135deg,#eef2ff,#f8fafc);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar{
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 18px 35px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo{
      font-size:24px;
      font-weight:800;
      color:#2563eb;
    }

    .logout-btn{
      background:#ef4444;
      border:none;
      color:white;
      padding:10px 16px;
      border-radius:10px;
      font-weight:600;
    }

    /* SEARCH */
    .search-box{
      max-width:750px;
      margin:30px auto;
    }

    .search-input{
      width:100%;
      padding:15px 18px;
      border-radius:14px;
      border:none;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      outline:none;
    }

    /* JOB GRID */
    .jobs-container{
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:22px;
      padding:20px;
    }

    /* JOB CARD */
    .job-card{
      background:white;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.3s;
      border-top:4px solid #2563eb;
    }

    .job-card:hover{
      transform:translateY(-6px);
    }

    .job-title{
      font-size:20px;
      font-weight:700;
      margin-bottom:10px;
    }

    .apply-btn{
      margin-top:15px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:linear-gradient(to right,#2563eb,#4f46e5);
      color:white;
      font-weight:700;
    }

    .apply-btn:hover{
      transform:scale(1.02);
    }

    /* MODAL */
    #applyModal{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .modal-box{
      background:white;
      padding:25px;
      border-radius:16px;
      width:420px;
      max-width:90%;
    }

    .modal-box h4{
      margin-bottom:15px;
      font-weight:700;
    }

    .form-control{
      margin-top:10px;
      border-radius:10px;
    }

    .submit-btn{
      width:100%;
      margin-top:15px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      font-weight:700;
    }

    .close-btn{
      width:100%;
      margin-top:10px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#ef4444;
      color:white;
      font-weight:700;
    }

  </style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Job Portal</div>

  <div>
    Welcome, <b id="username"></b>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input class="search-input" id="searchInput"
         placeholder="Search jobs..."
         onkeyup="searchJobs()">
</div>

<!-- JOB LIST -->
<div class="jobs-container" id="jobs"></div>

<!-- APPLY MODAL -->
<div id="applyModal">

  <div class="modal-box">

    <h4>Apply for Job</h4>

    <input id="name" class="form-control" placeholder="Full Name">
    <input id="email" class="form-control" placeholder="Email">
    <input id="phone" class="form-control" placeholder="Phone">
    <input id="age" class="form-control" placeholder="Age">

    <input id="skills" class="form-control" placeholder="Skills (React, Java, etc)">
    <input id="experience" class="form-control" placeholder="Experience (years)">

    <textarea id="message" class="form-control" placeholder="Why should we hire you?"></textarea>

    <button class="submit-btn" onclick="submitApplication()">
      Submit Application
    </button>

    <button class="close-btn" onclick="closeForm()">
      Cancel
    </button>

  </div>

</div>

<script>

  let user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    window.location.href = "login.html";
  }

  document.getElementById("username").innerText = user.name;

  let allJobs = [];
  let selectedJob = null;

  // LOAD JOBS
  fetch("http://localhost:8080/jobs/all")
          .then(res => res.json())
          .then(data => {
            allJobs = data;
            displayJobs(allJobs);
          });

  // DISPLAY
  function displayJobs(jobs){

    let html = "";

    jobs.forEach(job => {

      html += `
      <div class="job-card">

        <div class="job-title">${job.title}</div>

        <p><b>Company:</b> ${job.companyName}</p>
        <p>${job.description}</p>

        <button class="apply-btn"
          onclick="openForm(${job.id}, '${job.title}', '${job.companyName}')">
          Apply Now
        </button>

      </div>
    `;
    });

    document.getElementById("jobs").innerHTML = html;
  }

  // SEARCH
  function searchJobs(){

    let val = document.getElementById("searchInput").value.toLowerCase();

    let filtered = allJobs.filter(job =>
            job.title.toLowerCase().includes(val) ||
            job.companyName.toLowerCase().includes(val)
    );

    displayJobs(filtered);
  }

  // OPEN FORM
  function openForm(id,title,company){
    selectedJob = {id,title,company};
    document.getElementById("applyModal").style.display = "flex";
  }

  // CLOSE FORM
  function closeForm(){
    document.getElementById("applyModal").style.display = "none";
  }

  // VALIDATION + SUBMIT
  function submitApplication(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let age = document.getElementById("age").value;
    let skills = document.getElementById("skills").value;
    let experience = document.getElementById("experience").value;
    let message = document.getElementById("message").value;

    // ❗ VALIDATION
    if(!name || !email || !phone || !age || !skills || !experience || !message){
      alert("Please fill all fields before applying!");
      return;
    }

    fetch("http://localhost:8080/application/apply", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        jobId: selectedJob.id,
        jobTitle: selectedJob.title,
        companyName: selectedJob.company,

        userName: name,
        userEmail: email,
        phone,
        age,
        skills,
        experience,
        message,
        status:"PENDING"
      })
    })
            .then(res => res.json())
            .then(() => {
              alert("Application Submitted Successfully");
              closeForm();
            })
            .catch(() => {
              alert("Failed to submit application");
            });

  }

  // LOGOUT
  function logout(){
    localStorage.clear();
    window.location.href = "login.html";
  }

</script>

</body>
</html>
