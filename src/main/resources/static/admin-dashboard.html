<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f1f5f9;
      font-family: Arial;
    }

    .card-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .sidebar {
      background: #1e293b;
      height: 100vh;
      color: white;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: #cbd5e1;
      padding: 10px;
      text-decoration: none;
    }

    .sidebar a:hover {
      background: #334155;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h4>Admin Panel</h4>
      <a href="#">Dashboard</a>
      <a href="#">Users</a>
      <a href="#">Jobs</a>
      <a href="#">Applications</a>
      <button class="btn btn-danger mt-4 w-100" onclick="logout()">
        Logout
      </button>
    </div>

    <!--Main -->
    <div class="col-md-10 p-4">

      <h3> Admin Dashboard</h3>
      <p>Welcome, <span id="adminName"></span></p>

      <div class="row mt-4">

        <div class="col-md-4">
          <div class="card-box">
            <h5>Total Users</h5>
            <h2 id="users">0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box">
            <h5>Total Jobs</h5>
            <h2 id="jobs">0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box">
            <h5>Applications</h5>
            <h2 id="apps">0</h2>
          </div>
        </div>

      </div>

    </div>

  </div>
</div>

<script>

  let user = JSON.parse(localStorage.getItem("user"));

  if (!user || user.role !== "ADMIN") {
    window.location.href = "/login.html";
  }

  document.getElementById("adminName").innerText = user.name;

  // 🔥 later connect backend APIs
  // fetch("/admin/stats")
  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "/login.html";

  }

</script>

</body>
</html>
